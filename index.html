<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>game-station</title>
    
</head>
<body>
   <header>
        <div class="card">
            <div class="buttons">
                <a id="menubtn" href="javascript:void(0)" class="round-button" onclick="togglenav()">
                    <div class="aaa"></div>
                    <div class="aaa"></div>
                    <div class="aaa"></div>
                </a>
            </div>  
        </div>
    </header>
    <h1 style="color: red; font-size: 40px; text-align: center;">welcome to the website </h1>

    <div class="game_holder">
        
        <a href="games/diffrences/memory_game.html" class="game btn-1">memory-card-game</a>

        <a href="games/roadkill/roadcross.html" class="game btn-2">cross-the-road</a>

        <a href="games/tiles/tiles.html" class="game btn-3">ping-pong</a>

        <a href="games/tictactoe/tictactoe.html" class="game btn-4">tic-tac-toe</a>

        <a href="games/rockpaper/rocpapsc.html" class="game btn-5">rock-paper-sciscors</a>

        <a href="games/minesweeper/minesweeper.html" class="game btn-6">minesweeper</a>

    </div>


    <div id="main">
        <div id="mySidenav" class="sidenav">
            <b href="javascript:void(0)" class="close-btn" onclick="togglenav()">&times;</b>
            <a href="#" onclick="toggleabout()">about us</a>
            <a href="#" onclick="togglecontact()">Contact us</a>
        </div>

        <div id="aboutid">
            <a href="#" class="close-btn" onclick="toggleabout()" >&times;</a>
            <div>
                <p>this is a simple javascript site that all, i guess  </p>
            </div>
        </div>
        <div id="contactid">
            <a href="#" class="close-btn" onclick="togglecontact()">&times;</a>
            <div>
                <p>you can contact us at 123@example.com</p>
            </div>
        </div>
    </div>
    

    <script>

        function togglenav() {
            var state = document.getElementById("mySidenav");
            if(state.style.width === "250px"){
                document.getElementById("mySidenav").style.width = "0";
                document.getElementById("main").style.marginLeft = "0";
            }
            else{
                document.getElementById("mySidenav").style.width = "250px";
                document.getElementById("main").style.marginLeft = "250px";
            }
        }
       function toggleabout() {
            var element = document.getElementById("aboutid");
            element.classList.toggle("open");
}
        function togglecontact() {
            var element = document.getElementById("contactid");
            element.classList.toggle("open");
}
    </script>
    
</body>
</html>
