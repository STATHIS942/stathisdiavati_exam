<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross the Blocks</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
      
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html, body, canvas {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #17202a 90%,
    rgb(108, 16, 16),
    rgb(154, 8, 8),
    rgb(235, 0, 0));
    background-repeat: no-repeat;
    background-attachment: fixed;
            overflow: hidden;
        }
        
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <script>
    $(function() {

        var canvas = document.createElement("canvas");
        var ctx    = canvas.getContext('2d');

        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;

        document.body.appendChild(canvas);

        function rand(min, max, interval) {
          if(interval === undefined) interval = 1;
          return Math.round((Math.floor(Math.random() * (max - min + 1)) + min) / interval) * interval;
        }

        function randIndex(thearray) {
          return thearray[rand(1, thearray.length) - 1];
        }

        var player = (function() {
         
          var x = 100, 
              y = canvas.height/2,
              w = 10,
              h = 10,
              speed = 10,
              dead = false,
              death = 0;
              
          return {
            
            getX: function() {
              return x;
            },
            
            getY: function() {
              return y;
            },
            
            getW: function() {
              return w;
            },
            
            getH: function() {
              return h;
            },
            
            die: function() {
              dead = true;
              ++death;
            },
            
            getDeath: function() {
              return death;
            },
            
            resurrect: function() {
              this.moveTo(100 , canvas.height/2);
              dead = false;
              this.draw();
            },
            
            respawn: function() {
              this.moveTo(100 , canvas.height/2);
              this.draw();
              blocks.nextLevel();
            },
            
            isDead: function() {
              return dead;
            },
            
            draw: function() {
              ctx.fillStyle = "#50BEFA"; 
              ctx.fillRect(x, y, w, h);
            },
            
            moveTo: function(a, b) {
              if(dead) return;
              x = a;
              y = b;
              if(y+h>canvas.height) {
                y = canvas.height - h;
              }
            },
          }
        })();


        var blocks = (function() {
         
          var blocksArray = [], 
              level = 0,
              level_factor = 1.20,
              start = {
                n : 10,
                x1 : 210,
                x2 : 700,
                h_min : 15,
                h_max : 100,
                speed_min : 0.5,
                speed_max : 5,
                direction : ['up','down']
              };
          
          
          function Block(direction) {
            this.w = 10;
            this.h = rand(start.h_min, start.h_max);
            this.x = rand(start.x1,start.x2,10);
            this.y = 0;
            this.speed = rand(start.speed_min,start.speed_max);
            this.direction = direction;
            if(direction === "up") {
              this.y = canvas.height + rand(5, 350);
            }
            else {
              this.y -= rand(5, 350);
            }
          }

          return {
            
            curLevel: function() {
              return level;  
            },
            
            nextLevel: function() {
              
  
                ++level;
                canvas.height = window.innerHeight + 15; 
                blocksArray = [];
                
                if (level < 20) {
                  start.x2 = Math.min(start.x2 + 50, canvas.width - 150);
                }

                var n = Math.ceil(start.n + (level*level_factor));
                this.createXBlocks(n);

                          

            },
            
            draw: function(b) {
              if(player.isDead()) ctx.fillStyle = "#800000";
              else ctx.fillStyle = "#D98D00";
              ctx.fillRect(b.x, b.y, b.w, b.h);
            },
            
            drawZone: function() {
              ctx.fillStyle = "#111111";
              ctx.fillRect(start.x1, 0, start.x2-start.x1+10, canvas.height);
            },
            
            createXBlocks: function(n) { 
              for(var i=0; i<n; ++i) {
                blocksArray.push(new Block(randIndex(start.direction)));
              }
            },
            
            moveAll: function() {
              var px = player.getX(),
                  py = player.getY(),
                  pw = player.getW(),
                  ph = player.getH();
              
              if(player.isDead()) return;
              else if(px > start.x2) {      
                //level pass
                ctrl.x = 100;
                ctrl.y = canvas.height/2;
                ctrl.velX = 0;
                ctrl.velY = 0;
                player.respawn();
                return;
              }
              
              var len = blocksArray.length;
              for(var i=0; i < len; ++i) {
                if(blocksArray[i].direction === 'up') {
                  blocksArray[i].y -= blocksArray[i].speed;
                  if((blocksArray[i].y + blocksArray[i].h) < 0) {
                    blocksArray[i].y = canvas.height + rand(10, 350);
                  }
                }
                else {
                  blocksArray[i].y += blocksArray[i].speed;
                  if(blocksArray[i].y > canvas.height) {
                    blocksArray[i].y = 0;
                    blocksArray[i].y -= rand(10, 350);
                  }
                } 
                
                if(((px > blocksArray[i].x) && (px < (blocksArray[i].x + blocksArray[i].w))) && 
                   ((py > blocksArray[i].y) && py < (blocksArray[i].y + blocksArray[i].h) )) {
                  player.die();
                }  
                else if(((px+pw < (blocksArray[i].x + blocksArray[i].w)) && (px+pw > blocksArray[i].x)) && 
                   ((py+ph < (blocksArray[i].y + blocksArray[i].h)) && py+ph > blocksArray[i].y)) {
                  player.die();
                }  
              }
            },
            
            drawAll: function() {
              for(var i in blocksArray) {
                this.draw(blocksArray[i]);
              }
            },
          }
        })();


        var ctrl = {
          x : 100, 
          y : (canvas.height/2),  
          velY : 0,
          velX : 0,
          speed : 5, 
          friction : 0.85, 
          keys : []
        }

        function updateCtrl() {
          // restart
          if(ctrl.keys[32]) {
            if(player.isDead()) {
              ctrl.x = 100;
              ctrl.y = canvas.height/2;
              ctrl.velX = 0;
              ctrl.velY = 0;
              player.resurrect();
            }
          }

          if (ctrl.keys[38] || ctrl.keys[87]) {
            if (ctrl.velY > -ctrl.speed) { ctrl.velY--; }
          }
          if (ctrl.keys[40] || ctrl.keys[83]) {
            if (ctrl.velY < ctrl.speed) { ctrl.velY++; }
          }
          if (ctrl.keys[39] || ctrl.keys[68]) {
            if (ctrl.velX < ctrl.speed) { ctrl.velX++; }
          }
          if (ctrl.keys[37] || ctrl.keys[65]) {
            if (ctrl.velX > -ctrl.speed) { ctrl.velX--; }
          }
          
          ctrl.velY *= ctrl.friction;
          ctrl.y += ctrl.velY;
          ctrl.velX *= ctrl.friction;
          ctrl.x += ctrl.velX;

          if (ctrl.x >= canvas.width) { ctrl.x = canvas.width; } 
          else if (ctrl.x <= 5) { ctrl.x = 5; }

          if (ctrl.y > canvas.height) { ctrl.y = canvas.height; } 
          else if (ctrl.y <= 5) { ctrl.y = 5; }

          player.moveTo(ctrl.x, ctrl.y);
          setTimeout(updateCtrl, 10);
        }

        updateCtrl();

        document.body.addEventListener("keydown", function (e) {
          ctrl.keys[e.keyCode] = true;
        });
        document.body.addEventListener("keyup", function (e) {
          ctrl.keys[e.keyCode] = false;
        });

        blocks.nextLevel();

        function update() {
          blocks.moveAll();
        }

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          blocks.drawZone();
          blocks.drawAll();
          player.draw();

          if(player.isDead()) {
            ctx.fillStyle = "#9F000C";
            ctx.font="14px Verdana";
            ctx.fillText("Game over!",10,50);
            ctx.fillText("Press [SPACE] to Restart",10,70);
          }
          else {
            ctx.fillStyle = "#D98D00";
            ctx.font="14px Verdana";
            ctx.fillText("Cross to the other side",10,20);
            ctx.fillText("---------------------->",10,40);
            
            ctx.fillText("Use keyboard arrows",10,60);
            ctx.fillText("or [A] [W] [S] [D]",10,80);
            
            ctx.fillText("Level : " + blocks.curLevel(),10,150);
            ctx.fillText("Death : " + player.getDeath(),10,170);
          }
        }

        var fps = 0, now, lastUpdate = (new Date)*1;
        var fpsFilter = 50;

        function drawFrame(){
          var thisFrameFPS = 1000 / ((now=new Date) - lastUpdate);
          if (now!=lastUpdate){
            fps += (thisFrameFPS - fps) / fpsFilter;
            lastUpdate = now;
            if(isNaN(fps)) fps = 1;
            
            ctx.fillStyle = "#888";
            ctx.font="10px Verdana";
            ctx.fillText(fps.toFixed(0) + " fps",5,canvas.height-5);
          }
        }

        var animation_fps = 60;
        setInterval(function() {
          update();
          draw();
          drawFrame();
        }, 1000/animation_fps);
          
    });
    </script>
    
</body>
</html>
