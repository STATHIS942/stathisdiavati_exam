<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Breakout</title>
    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #17202a 75%,
    rgb(108, 16, 16),
    rgb(154, 8, 8),
    rgb(235, 0, 0));
    background-repeat: no-repeat;
    background-attachment: fixed;
        }

        canvas {
            background: linear-gradient(to bottom, #17202a 75%,
    rgb(108, 16, 16),
    rgb(154, 8, 8),
    rgb(235, 0, 0));
    background-repeat: no-repeat;
    background-attachment: fixed;
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
<canvas id="myCanvas"></canvas> 

<script>
var canvas = document.getElementById("myCanvas");
var ctx = canvas.getContext("2d");

var gameState = "PLAYING";

var prevTime = new Date().getTime();
var time = null;
var newTime = null;

var ballRadius = 10;
var startX, x, startY, y;
var startDx = 0.3;
var dx = startDx;
var startDy = 0.3;
var dy = -startDy;

var paddleHeight = 15;
var paddleWidth = 120; 
var paddleDx = 6;
var paddleX;
var rightPressed = false;
var leftPressed = false;
var paddleBottomOffset = 10;

var brickRowCount = 5;       
var brickColumnCount = 14;   
var brickHeight = 20;
var brickPadding = 6;
var brickOffsetTop = 60;
var brickOffsetLeft = 25;
var brickWidth; 

var score = 0;
var lives = 3;

var bricks = [];
function initBricks() {
  bricks = [];
  for (var c = 0; c < brickColumnCount; c++) {
    bricks[c] = [];
    for (var r = 0; r < brickRowCount; r++) {
      bricks[c][r] = { x: 0, y: 0, status: 1 };
    }
  }
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    startX = canvas.width / 2;
    startY = canvas.height - paddleHeight - paddleBottomOffset - ballRadius - 2;
    
    if (gameState === "PLAYING" && (x === undefined || (lives === 3 && score === 0))) {
        resetBallAndPaddle();
    }

    var totalPaddingSpace = brickPadding * (brickColumnCount - 1);
    var totalMarginSpace = brickOffsetLeft * 2;
    brickWidth = (canvas.width - totalPaddingSpace - totalMarginSpace) / brickColumnCount;
}

function resetBallAndPaddle() {
    x = startX;
    y = startY;
    dx = startDx;
    dy = -startDy;
    paddleX = (canvas.width - paddleWidth) / 2;
    prevTime = new Date().getTime(); 
}

function resetGame() {
    score = 0;
    lives = 3;
    initBricks();
    resetBallAndPaddle();
    gameState = "PLAYING";
}

initBricks();
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawBricks() {
  for (var c = 0; c < brickColumnCount; c++) {
    for (var r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status == 1) {
        var brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
        var brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
        bricks[c][r].x = brickX;
        bricks[c][r].y = brickY;
        ctx.beginPath();
        ctx.rect(brickX, brickY, brickWidth, brickHeight);
        ctx.fillStyle = "rgb(59, 5, 79)"; 
        ctx.fill();
        ctx.closePath();
      }
    }
  }
}

function drawBall() {
  ctx.beginPath(); 
  ctx.arc(x, y, ballRadius, 0, Math.PI * 2); 
  ctx.fillStyle = "rgb(0, 3, 68),"; 
  ctx.fill();
  ctx.closePath(); 
}

function drawPaddle() {
  ctx.beginPath();
  ctx.rect(paddleX, canvas.height - paddleHeight - paddleBottomOffset, paddleWidth, paddleHeight);
  ctx.fillStyle = "#17202a";
  ctx.fill();
  ctx.closePath();
}

function drawScreenOverlay(title, subtitle, color) {
  ctx.fillStyle = "rgba(17, 23, 30, 0.85)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = "bold 48px Arial";
  ctx.fillStyle = color;
  ctx.textAlign = "center";
  ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);

  ctx.font = "20px Arial";
  ctx.fillStyle = "#ffffff";
  ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 30);

  ctx.fillStyle = "#0095DD";
  ctx.fillRect(canvas.width / 2 - 100, canvas.height / 2 + 70, 200, 45);
  
  ctx.font = "bold 16px Arial";
  ctx.fillStyle = "#ffffff";
  ctx.fillText("PLAY AGAIN", canvas.width / 2, canvas.height / 2 + 98);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height); 
  
  if (gameState === "PLAYING") {
      newTime = new Date().getTime();
      time = newTime - prevTime;
      prevTime = newTime;
      
      if (time > 100) { time = 16.66; }

      drawBricks();
      drawBall(); 
      drawPaddle();
      drawScore();
      drawLives();
      collisionDetection();
      
      if (y + dy < ballRadius) { 
        dy = Math.abs(dy);
      } 
      
      var paddleTopY = canvas.height - paddleHeight - paddleBottomOffset;
      if (y + dy > paddleTopY - ballRadius) {
        if (x > paddleX && x < paddleX + paddleWidth) {
          dy = -Math.abs(dy);
        } else if (y + dy > canvas.height) { 
          lives--; 
          if (!lives) { 
            gameState = "GAMEOVER";
          } else {
            resetBallAndPaddle();
          }
        }
      }
      
      if (x + dx < ballRadius) { 
        dx = Math.abs(dx);
      } else if (x + dx > canvas.width - ballRadius) {
        dx = -Math.abs(dx);
      }
      
      if (rightPressed && paddleX < canvas.width - paddleWidth) {
        paddleX += paddleDx;
      } else if (leftPressed && paddleX > 0) {
        paddleX -= paddleDx;
      }
      
      x += dx * time; 
      y += dy * time; 
  } else if (gameState === "GAMEOVER") {
      drawScreenOverlay("GAME OVER", "Final Score: " + score, "#ff4a4a");
  } else if (gameState === "WIN") {
      drawScreenOverlay("YOU WIN!", "Incredible! Final Score: " + score, "#4aff4a");
  }
}

document.addEventListener("keydown", keyDownHandler, false);
document.addEventListener("keyup", keyUpHandler, false);

function keyDownHandler(e) {
  if (e.keyCode == 39) { rightPressed = true; } 
  else if (e.keyCode == 37) { leftPressed = true; }
}

function keyUpHandler(e) {
  if (e.keyCode == 39) { rightPressed = false; } 
  else if (e.keyCode == 37) { leftPressed = false; }
}

function collisionDetection() {
  for (var c = 0; c < brickColumnCount; c++) {
    for (var r = 0; r < brickRowCount; r++) {
      var b = bricks[c][r];
      if (b.status == 1) {
        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
          dy = -dy;
          b.status = 0;
          score++;
          if (score == brickRowCount * brickColumnCount) {
             gameState = "WIN";
          }
        }
      }
    }
  }
}

function drawScore() {
  ctx.font = "16px Arial";
  ctx.fillStyle = "#0095DD";
  ctx.textAlign = "left";
  ctx.fillText("Score: " + score, 20, 30);
}

function drawLives() {
  ctx.font = "16px Arial";
  ctx.fillStyle = "#0095DD";
  ctx.textAlign = "right";
  ctx.fillText("Lives: " + lives, canvas.width - 20, 30);
}

// Mouse movement listeners
document.addEventListener("mousemove", mouseMoveHandler, false);
function mouseMoveHandler(e) {
  var relativeX = e.clientX - canvas.offsetLeft;
  if (relativeX > 0 && relativeX < canvas.width) {
    paddleX = relativeX - paddleWidth / 2;
  }
}

document.addEventListener("click", function(e) {
    if (gameState !== "PLAYING") {
        var rect = canvas.getBoundingClientRect();
        var clickX = e.clientX - rect.left;
        var clickY = e.clientY - rect.top;
        
        var btnX = canvas.width / 2 - 100;
        var btnY = canvas.height / 2 + 70;
        
        if (clickX >= btnX && clickX <= btnX + 200 && clickY >= btnY && clickY <= btnY + 45) {
            resetGame();
        }
    }
});

function gameLoop() {
    draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
